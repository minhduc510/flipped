<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="48" height="48" fill="none">
  <!-- Nền hình vuông bo góc với màu xanh Accent của ứng dụng -->
  <rect width="24" height="24" rx="6" fill="#3b82f6"/>
  <!-- Trang sách bên trái -->
  <path d="M12 6C9.5 6 7 4.5 5 5V17C7 16.5 9.5 18 12 18V6Z" fill="white"/>
  <!-- Trang sách bên phải -->
  <path d="M12 6C14.5 6 17 4.5 19 5V17C17 16.5 14.5 18 12 18V6Z" fill="white" opacity="0.95"/>
  <!-- Gáy sách phân tách -->
  <line x1="12" y1="5.5" x2="12" y2="17.5" stroke="#3b82f6" stroke-width="1"/>
  <!-- Các dòng chữ tượng trưng trang bên trái -->
  <line x1="7" y1="9" x2="10" y2="9" stroke="#3b82f6" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="7" y1="12" x2="9" y2="12" stroke="#3b82f6" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Các dòng chữ tượng trưng trang bên phải -->
  <line x1="14" y1="9" x2="17" y2="9" stroke="#3b82f6" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="14" y1="12" x2="16" y2="12" stroke="#3b82f6" stroke-width="1.2" stroke-linecap="round"/>
</svg>